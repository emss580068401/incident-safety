<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>情境模擬測驗 | 事故安全官資源網</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* MAYDAY Immersive background */
        body.dark-bg {
            background-image: url('images/mayday_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body.dark-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(5, 10, 20, 0.82);
            z-index: 0;
            pointer-events: none;
        }
        .quiz-wrapper {
            position: relative;
            z-index: 1;
        }
        canvas#embers-quiz {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 8rem auto 4rem;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }

        .progress-bar-container {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-left: 2rem;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gradient-blue);
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* 作答解析面板 */
        .review-toggle-btn {
            background: rgba(56,189,248,0.1);
            border: 1px solid rgba(56,189,248,0.3);
            color: #38bdf8;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
            width: 100%;
            transition: all 0.3s;
        }
        .review-toggle-btn:hover { background: rgba(56,189,248,0.2); }
        #answer-review-panel { display: none; margin-top: 1.5rem; text-align: left; }
        #answer-review-panel.open { display: block; }
        .review-item {
            border-radius: 10px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid;
        }
        .review-correct { background: rgba(16,185,129,0.07); border-color: #10b981; }
        .review-wrong   { background: rgba(239,68,68,0.07);  border-color: #ef4444; }
        .review-q-num   { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
        .review-scenario { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .review-question { color: white; margin-bottom: 0.6rem; }
        .review-options  { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.6rem; }
        .review-opt { padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.85rem; background: rgba(255,255,255,0.05); color: var(--text-secondary); }
        .review-opt.is-correct { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid #10b981; }
        .review-opt.is-wrong   { background: rgba(239,68,68,0.2);  color: #ef4444;  border: 1px solid #ef4444; }
        .review-feedback { font-size: 0.9rem; color: #94a3b8; font-style: italic; }

        .question-text {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: white;
        }

        .scenario-box {
            background: rgba(0,0,0,0.3);
            border-left: 4px solid var(--accent-fire);
            padding: 1.5rem;
            border-radius: 0 10px 10px 0;
            margin-bottom: 2rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            gap: 1rem;
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            color: white;
            transform: translateX(5px);
        }

        .option-btn.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: white;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .feedback-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .feedback-box.show {
            display: block;
        }

        .feedback-box.correct-fb {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid #10b981;
        }

        .feedback-box.wrong-fb {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
        }

        .feedback-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .correct-fb .feedback-title { color: #34d399; }
        .wrong-fb .feedback-title { color: #fca5a5; }

        .feedback-content {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .next-btn {
            margin-top: 2rem;
            width: 100%;
            background: var(--gradient-blue);
            color: white;
            border: none;
            padding: 1.2rem;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: none;
            transition: all 0.3s;
        }
        
        .next-btn:hover { background: #0284c7; }

        /* Score Screen */
        .score-screen {
            display: none;
            text-align: center;
        }
        
        .score-screen.active {
            display: block;
            animation: fadeIn 1s;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
            border: 4px solid #10b981;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            font-weight: 800;
            margin: 0 auto 2rem;
            color: white;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
        }

        .score-title { font-size: 2.5rem; margin-bottom: 1rem; color: #38bdf8; }
        .score-desc { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 3rem; }

    </style>
</head>
<body class="dark-bg">

    <!-- Embers particle canvas -->
    <canvas id="embers-quiz"></canvas>

    <nav class="navbar scrolled">
        <div class="nav-container">
            <div class="logo">
                <span class="icon">🎮</span>
                <span class="text">測驗系統</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首頁總覽</a></li>
                <li><a href="training.html">前線安全戰技</a></li>
                <li><a href="rights.html">消防三權與職安</a></li>
                <li><a href="investigation.html">災害事故調查</a></li>
                <li><a href="quiz.html" style="color:white; border-bottom:2px solid; padding-bottom:0.2rem">情境測驗</a></li>
            </ul>
            <button class="navbar-toggler" id="mobile-menu-btn">
                <span class="toggler-bar bar1"></span>
                <span class="toggler-bar bar2"></span>
                <span class="toggler-bar bar3"></span>
            </button>
        </div>
    </nav>

    <main class="container quiz-wrapper">
        
        <div class="quiz-container" id="quiz-container">
            
            <!-- Quiz UI -->
            <div id="quiz-ui">
                <div class="quiz-header">
                    <span id="question-counter" style="color: var(--text-secondary); font-weight: 600;">Question 1 / 3</span>
                    <div class="progress-bar-container">
                        <div class="progress-fill" id="progress-bar"></div>
                    </div>
                </div>

                <div class="scenario-box" id="scenario-text">
                    <!-- Scenario text renders here -->
                </div>

                <h2 class="question-text" id="question-text">
                    <!-- Question text renders here -->
                </h2>

                <div class="options-grid" id="options-grid">
                    <!-- Buttons generated dynamically -->
                </div>

                <div class="feedback-box" id="feedback-box">
                    <div class="feedback-title" id="feedback-title">解答解析</div>
                    <div class="feedback-content" id="feedback-content">...</div>
                </div>

                <button class="next-btn" id="next-btn">進入下一題 ➡️</button>
            </div>

            <!-- Score UI -->
            <div class="score-screen" id="score-screen">
                <div class="score-circle" id="score-number">100</div>
                <h2 class="score-title" id="score-title">卓越安全官</h2>
                <p class="score-desc" id="score-desc">您對消防法規與現場安全評估具備了極高的素養，已完美掌握生命無價的核心信念！</p>
                <div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-top:1.5rem;">
                    <button class="btn btn-primary" id="restart-btn">🎲 隨機再挑戰！</button>
                    <a href="training.html" class="btn" style="background:rgba(255,255,255,0.1); color:white;">回顧戰技教材</a>
                </div>
                <button class="review-toggle-btn" id="review-toggle-btn" onclick="toggleReview()">📝 查看本次作答解析</button>
                <div id="answer-review-panel">
                    <div id="answer-review-list"></div>
                </div>
            </div>

        </div>

    </main>

    <script src="js/app.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/quiz.js"></script>
    <script>
        // Boot embers on quiz page
        initEmbers('embers-quiz');

        // Restart button
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('score-screen').classList.remove('active');
            document.getElementById('answer-review-panel').classList.remove('open');
            document.getElementById('review-toggle-btn').textContent = '📝 查看本次作答解析';
            document.getElementById('quiz-ui').style.display = '';
            initQuiz();
        });

        // Toggle answer review panel
        function toggleReview() {
            const panel = document.getElementById('answer-review-panel');
            const btn = document.getElementById('review-toggle-btn');
            panel.classList.toggle('open');
            btn.textContent = panel.classList.contains('open')
                ? '🔼 收合解析'
                : '📝 查看本次作答解析';
        }

        // Hook into quiz feedback events
        window.onQuizCorrect = function(btn) {
            flashScreen('rgba(16,185,129,0.25)', 700);
            correctBurst(btn);
        };
        window.onQuizWrong = function() {
            flashScreen('rgba(239,68,68,0.35)', 800);
            shakeScreen(7, 550);
        };
    </script>
</body>
</html>
